services:
  # 1. Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem-dashboard-api
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - APP_PORT=3000
      - POSTGRES_HOST=rdbms
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-backend_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-siem_db}
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX_SECURITY_ALERTS=${ELASTICSEARCH_INDEX_SECURITY_ALERTS:-security-alerts}
    depends_on:
      rdbms:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-network

  # 2. Database Relasional (RDBMS)
  rdbms:
    image: postgres:15-alpine
    container_name: test-rdbms
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backend_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DATABASE:-siem_db}
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backend_user} -d ${POSTGRES_DATABASE:-siem_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - siem-network

  # 3. Elasticsearch (ES)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.2
    container_name: test-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - siem-network

  # 4. Otomasi Inject Data Ke ES
  es-initializer:
    image: curlimages/curl:latest
    container_name: test-es-initializer
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./init-es:/scripts
    entrypoint: ["sh", "/scripts/setup-es.sh"]
    networks:
      - siem-network

networks:
  siem-network:
    driver: bridge
